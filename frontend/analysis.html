<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>minimalVoice analysis</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; font-family: ui-sans-serif, system-ui, sans-serif; background: #0d1117; color: #e6edf3; padding: 24px; }
    h1 { font-size: 18px; } h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .05em; color: #7d8590; margin-top: 28px; }
    table { border-collapse: collapse; width: 100%; font-size: 13px; margin-top: 8px; }
    th, td { text-align: right; padding: 6px 10px; border-bottom: 1px solid #21262d; font-variant-numeric: tabular-nums; }
    th:first-child, td:first-child { text-align: left; font-family: ui-monospace, monospace; }
    th { color: #7d8590; font-weight: 600; }
    .cards { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
    .card { background: #161b22; border: 1px solid #21262d; border-radius: 10px; padding: 14px 18px; min-width: 150px; }
    .card .k { font-size: 12px; color: #7d8590; } .card .v { font-size: 22px; font-family: ui-monospace, monospace; color: #58a6ff; }
    .card .sub { font-size: 11px; color: #7d8590; margin-top: 4px; }
    a { color: #58a6ff; } .bad { color: #f85149; } .ok { color: #3fb950; }
    select { background: #010409; color: #e6edf3; border: 1px solid #30363d; border-radius: 6px; padding: 6px; }
  </style>
</head>
<body>
  <h1>minimalVoice &mdash; timing analysis <a href="/" style="font-size:13px;float:right">&larr; call</a></h1>

  <h2>All calls (aggregate)</h2>
  <div class="cards" id="agg"></div>

  <h2>Per call</h2>
  <select id="callSel"></select>
  <div id="callSummary"></div>

  <script>
    const stat = (b) => b && b.n ? `${b.p50} <span style="color:#7d8590">p90 ${b.p90}</span>` : "-";
    function card(k, b, unit) {
      if (!b || !b.n) return `<div class="card"><div class="k">${k}</div><div class="v">-</div></div>`;
      return `<div class="card"><div class="k">${k}</div><div class="v">${b.p50}<span style="font-size:13px"> ${unit}</span></div>
        <div class="sub">p90 ${b.p90} &middot; p99 ${b.p99} &middot; n=${b.n}</div></div>`;
    }
    async function loadAgg() {
      const a = await (await fetch("/api/analysis")).json();
      $("agg").innerHTML =
        card("Shot latency", a.shot_latency_ms, "ms") +
        card("STT", a.stt_ms, "ms") +
        card("LLM TTFT", a.llm_ttft_ms, "ms") +
        card("TTS TTFB", a.tts_ttfb_ms, "ms") +
        card("Audio generated", a.audio_generated_ms, "ms") +
        `<div class="card"><div class="k">Calls / turns</div><div class="v">${a.calls}/${a.turns}</div>
         <div class="sub">${a.audio_format.sample_rate} Hz &middot; ${a.audio_format.bytes_per_sec} B/s</div></div>`;
    }
    function $(id){ return document.getElementById(id); }
    async function loadCalls() {
      const calls = await (await fetch("/api/calls")).json();
      const sel = $("callSel");
      sel.innerHTML = calls.slice().reverse().map(c =>
        `<option value="${c.id}">${c.started_iso} &middot; ${c.id.slice(0,8)}</option>`).join("");
      if (calls.length) loadCall(sel.value);
      sel.onchange = () => loadCall(sel.value);
    }
    async function loadCall(id) {
      const s = await (await fetch("/api/analysis/" + id)).json();
      if (s.error) { $("callSummary").innerHTML = `<p>${s.error}</p>`; return; }
      const rows = s.turns.map(t => `<tr>
        <td>#${t.turn_index}</td><td>${t.chars_in ?? "-"}</td>
        <td>${fmt(t.stt_ms)}</td>
        <td>${fmt(t.llm_ttft_ms)}</td><td>${t.llm_tokens ?? "-"}</td>
        <td>${fmt(t.tts_ttfb_ms)}</td><td>${fmt(t.shot_latency_ms)}</td>
        <td>${fmt(t.audio_generated_ms)}</td>
        <td>${fmt(t.audio.lead_ms)}</td>
        <td class="${t.audio.underrun ? "bad" : "ok"}">${t.audio.underrun ? "UNDERRUN" : "ok"}</td>
      </tr>`).join("");
      $("callSummary").innerHTML = `
        <div class="cards">${card("Shot latency", s.shot_latency_ms, "ms")}${card("STT", s.stt_ms, "ms")}
          ${card("LLM TTFT", s.llm_ttft_ms, "ms")}${card("TTS TTFB", s.tts_ttfb_ms, "ms")}</div>
        <table><thead><tr><th>turn</th><th>chars</th><th>STT</th><th>LLM TTFT</th><th>tokens</th>
          <th>TTS TTFB</th><th>shot</th><th>audio gen</th><th>lead</th><th>channel</th></tr></thead>
        <tbody>${rows}</tbody></table>`;
    }
    const fmt = (v) => v == null ? "-" : Math.round(v);
    loadAgg(); loadCalls();
  </script>
</body>
</html>
